<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Anime List — Sabinaya Sapkota</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root{
    --main-color:#f60b0b;
    --bg-color:#080808;
    --card-bg:#111111;
    --text-dim:#b8b8b8;
    --border:#2a2a2a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg-color);
    color:#fff;
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    padding:50px 20px 80px;
  }
  .page-header{ text-align:center; margin-bottom:36px; }
  .page-header h1{
    font-size:2.4rem;
    font-weight:800;
    margin:0 0 10px;
    letter-spacing:.5px;
  }
  .page-header .underline{
    width:180px; height:4px; margin:0 auto;
    background:var(--main-color);
    border-radius:2px;
  }
  .page-header .subtitle{
    color:var(--text-dim);
    margin-top:12px;
    font-size:.95rem;
  }
  .page-header a{ color:var(--main-color); text-decoration:none; }
  .page-header a:hover{ text-decoration:underline; }

  .tabs{
    display:flex;
    justify-content:center;
    gap:28px;
    flex-wrap:wrap;
    margin-bottom:40px;
    border-bottom:1px solid var(--border);
    padding-bottom:14px;
  }
  .tab-btn{
    background:none; border:none; color:var(--text-dim);
    font-size:.95rem; cursor:pointer; padding:6px 2px;
    position:relative;
  }
  .tab-btn.active{ color:#fff; font-weight:700; }
  .tab-btn.active::after{
    content:''; position:absolute; left:0; right:0; bottom:-15px;
    height:3px; background:var(--main-color); border-radius:2px;
  }
  .tab-btn:hover{ color:#fff; }

  .status-msg{
    text-align:center; color:var(--text-dim);
    padding:40px 0; font-size:.95rem;
  }
  .status-msg i{ font-size:1.6rem; display:block; margin-bottom:10px; color:var(--main-color); }
  .status-msg a.retry{ color:var(--main-color); cursor:pointer; text-decoration:underline; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:26px;
    max-width:1200px;
    margin:0 auto;
  }

  .card{
    background:var(--card-bg);
    border:1.5px solid var(--main-color);
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 22px rgba(246,11,11,.25);
  }
  .card img{
    width:100%;
    height:230px;
    object-fit:cover;
    display:block;
    background:#1a1a1a;
  }
  .card-body{ padding:16px 18px 18px; display:flex; flex-direction:column; flex:1; }
  .card-title{
    font-size:1.05rem;
    font-weight:800;
    margin:0 0 10px;
    line-height:1.3;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    min-height:2.6em;
  }
  .card-meta{ color:var(--text-dim); font-size:.9rem; margin:2px 0; }
  .card-meta b{ color:#eee; font-weight:600; }
  .badge-status{
    display:inline-block;
    margin-bottom:10px;
    padding:3px 10px;
    border-radius:20px;
    font-size:.72rem;
    font-weight:700;
    letter-spacing:.4px;
    text-transform:uppercase;
    width:fit-content;
    background:rgba(246,11,11,.15);
    color:var(--main-color);
    border:1px solid rgba(246,11,11,.4);
  }
  .card-footer{ margin-top:auto; padding-top:12px; }
  .check-btn{
    display:block;
    text-align:center;
    background:#5c0a0a;
    color:#fff;
    text-decoration:none;
    padding:9px 0;
    border-radius:6px;
    font-size:.88rem;
    font-weight:600;
    border:1px solid var(--main-color);
    transition:background .2s ease;
  }
  .check-btn:hover{ background:var(--main-color); }

  footer{
    text-align:center; margin-top:60px;
    color:#555; font-size:.8rem;
  }
  footer a{ color:var(--main-color); text-decoration:none; }
</style>
</head>
<body>

<div class="page-header">
  <h1>My Anime List</h1>
  <div class="underline"></div>
  <div class="subtitle">
    Live from <a href="https://myanimelist.net/profile/Sabinaya_Sapkota" target="_blank" rel="noopener">myanimelist.net/profile/Sabinaya_Sapkota</a>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab-btn active" data-status="all">All Anime</button>
  <button class="tab-btn" data-status="watching">Currently Watching</button>
  <button class="tab-btn" data-status="completed">Completed</button>
  <button class="tab-btn" data-status="on_hold">On Hold</button>
  <button class="tab-btn" data-status="dropped">Dropped</button>
  <button class="tab-btn" data-status="plan_to_watch">Plan to Watch</button>
</div>

<div id="content">
  <div class="status-msg" id="statusMsg">
    <i class="bi bi-hourglass-split"></i>
    Loading anime list…
  </div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  Synced daily from MyAnimeList ·
  <a href="https://myanimelist.net/profile/Sabinaya_Sapkota" target="_blank" rel="noopener">View full profile on MyAnimeList</a>
</footer>

<script>
const USERNAME = "Sabinaya_Sapkota";
const DATA_URL = "./data/anime.json"; // filled in daily by the GitHub Action

const statusLabels = {
  watching: "Watching",
  completed: "Completed",
  on_hold: "On Hold",
  dropped: "Dropped",
  plan_to_watch: "Plan to Watch"
};

const grid = document.getElementById("grid");
const statusMsg = document.getElementById("statusMsg");
const tabs = document.getElementById("tabs");

let currentTab = "all";
let allEntries = null; // cached after first successful load

tabs.addEventListener("click", (e) => {
  const btn = e.target.closest(".tab-btn");
  if (!btn) return;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentTab = btn.dataset.status;
  render();
});

function showMessage(html) {
  statusMsg.innerHTML = html;
  statusMsg.style.display = "block";
  grid.innerHTML = "";
}

function placeholderImg() {
  return "data:image/svg+xml;utf8," + encodeURIComponent(
    `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='420'><rect width='300' height='420' fill='#1a1a1a'/><text x='50%' y='50%' fill='#555' font-size='16' text-anchor='middle' dy='.3em' font-family='sans-serif'>No image</text></svg>`
  );
}

function cardHTML(entry) {
  const statusLabel = statusLabels[entry.status] || (entry.status || "").replace(/_/g, " ") || "??";
  const watched = entry.episodes_watched ?? "?";
  const total = entry.episodes_total || "?";
  const scoreLabel = (entry.score && entry.score > 0) ? entry.score : "??";
  const img = entry.image || placeholderImg();
  const url = entry.url || `https://myanimelist.net/profile/${USERNAME}`;

  return `
    <div class="card">
      <img src="${img}" alt="${entry.title}" loading="lazy" onerror="this.src='${placeholderImg()}'">
      <div class="card-body">
        <span class="badge-status">${statusLabel}</span>
        <h3 class="card-title">${entry.title || "Untitled"}</h3>
        <div class="card-meta"><b>Episodes seen:</b> ${watched}/${total}</div>
        <div class="card-meta"><b>Score:</b> ${scoreLabel}</div>
        <div class="card-footer">
          <a class="check-btn" href="${url}" target="_blank" rel="noopener">Check it out</a>
        </div>
      </div>
    </div>
  `;
}

function render() {
  if (!allEntries) return;
  const items = currentTab === "all" ? allEntries : allEntries.filter(e => e.status === currentTab);

  if (!items.length) {
    showMessage(`<i class="bi bi-emoji-neutral"></i> Nothing in this list yet.`);
    return;
  }
  statusMsg.style.display = "none";
  grid.innerHTML = items.map(cardHTML).join("");
}

async function loadList() {
  showMessage(`<i class="bi bi-hourglass-split"></i> Loading anime list…`);

  try {
    const res = await fetch(DATA_URL, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${DATA_URL}`);
    const json = await res.json();

    allEntries = json.entries || [];
    render();
  } catch (err) {
    console.error(err);
    showMessage(`
      <i class="bi bi-exclamation-triangle"></i>
      Couldn't load <code>data/anime.json</code>.<br>
      <span style="font-size:.82rem;opacity:.85;">${(err.message || "unknown error").toString().slice(0,180)}</span><br><br>
      Make sure the GitHub Action has run at least once (Actions tab → "Update anime list" → Run workflow)
      so <code>data/anime.json</code> exists in the repo.<br><br>
      <a class="retry" onclick="loadList()">Try again</a>
      &nbsp;·&nbsp;
      <a href="https://myanimelist.net/profile/${USERNAME}" target="_blank" rel="noopener">View on MyAnimeList</a>
    `);
  }
}

loadList();
</script>

</body>
</html>
